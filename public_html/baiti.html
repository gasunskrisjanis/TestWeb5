<!DOCTYPE html>
<html>
<head>
    <title>Informācijas daudzuma aprēķins</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        function aprekinat(vieniba) {
            
            let sekundes = document.getElementById("sekundes").value;
            let atrumsMbps = 25; 
            let rezultats = 0;

            
            let kopējieBiti = sekundes * atrumsMbps * 1000000;

            if (vieniba === 'KB') {
                
                rezultats = kopējieBiti / 8 / 1000;
            } else if (vieniba === 'KiB') {
                
                rezultats = kopējieBiti / 8 / 1024;
            }

            document.getElementById("atbilde").value = rezultats;
        }

        function notiritFormu() {
            
            document.getElementById("baitiForm").reset(); 
        }
    </script>
</head>
<body>
    <form id="baitiForm">
        <p>
            Aprēķināt cik daudz informācijas var lejupielādēt 
            <input type="number" id="sekundes" onfocus="notiritFormu()"> 
            sekundēs, ja interneta ātrums ir 25 Mbps. 
        </p>

        <p>Atbilde</p>

        <input type="text" id="atbilde" readonly> 
        
        <input type="radio" name="meris" onclick="aprekinat('KiB')"> KiB 
        <input type="radio" name="meris" onclick="aprekinat('KB')"> KB 
    </form>
</body>
</html>
